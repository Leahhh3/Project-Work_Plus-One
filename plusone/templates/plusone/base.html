{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Plus One{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'plusone/styles.css' %}">
  <script defer src="{% static 'plusone/app.js' %}"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{% url 'discover' %}">
      <img class="brand-logo" src="{% static 'plusone/plusone-logo.jpeg' %}" alt="Plus One">
    </a>
    <nav class="nav">
      <a href="{% url 'discover' %}">Discover</a>
      <a href="{% url 'create_post' %}">Create</a>
      <a href="{% url 'dashboard' %}">My Plus Ones</a>
      <a href="{% url 'about' %}">About</a>
    </nav>
    <div class="identity-summary">
      <span>Anonymous session <strong>{{ user.userprofile.initial|default:"ON" }}</strong></span>
      <a href="{% url 'session' %}?next={{ request.path }}">Manage</a>
    </div>
  </header>

  {% if messages %}
    <section class="messages" aria-label="Messages">
      {% for message in messages %}
        <div class="message message-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </section>
  {% endif %}

  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
