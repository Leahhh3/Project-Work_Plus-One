databases:
  - name: plusone-db
    databaseName: plusone
    user: plusone

services:
  - type: web
    name: plusone
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: plusone-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: "https://api.deepseek.com"
      - key: PLUSONE_LLM_MODEL
        value: "deepseek-v4-flash"
      - key: WEB_CONCURRENCY
        value: "4"
